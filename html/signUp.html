<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>회원가입</title>
<style>
  body {
    margin: 0;
    padding: 30px 20px;
    background: #eef1f4;
    font-family: "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
    display: flex;
    justify-content: center;
  }

  .card {
    background: #ffffff;
    width: 460px;
    border: 1px solid #ccc;
    border-radius: 4px;
    padding: 20px 24px 26px;
  }

  h1 {
    font-size: 20px;
    margin: 0 0 6px;
  }

  .subtitle {
    font-size: 13px;
    color: #444;
    margin: 0 0 14px;
    padding-bottom: 12px;
    border-bottom: 1px solid #ddd;
  }

  fieldset {
    border: 1px solid #ccc;
    border-radius: 4px;
    margin-bottom: 16px;
    padding: 14px 16px 18px;
  }

  legend {
    font-weight: bold;
    padding: 0 6px;
  }

  label {
    display: inline-block;
    width: 78px;
    font-size: 14px;
    vertical-align: top;
  }

  .row {
    margin-bottom: 10px;
  }

  input[type="text"],
  input[type="password"],
  input[type="email"],
  input[type="date"] {
    padding: 4px 6px;
    font-size: 13px;
    border: 1px solid #bbb;
    border-radius: 3px;
  }

  select {
    padding: 3px;
    font-size: 13px;
  }

  textarea {
    width: 100%;
    box-sizing: border-box;
    padding: 6px;
    font-size: 13px;
    border: 1px solid #bbb;
    border-radius: 3px;
    resize: vertical;
  }

  .checkbox-group label,
  .radio-group label {
    width: auto;
    margin-right: 12px;
    font-size: 13px;
  }

  .checkbox-group div,
  .radio-group {
    margin-bottom: 6px;
  }

  .hint {
    font-size: 12px;
    color: #888;
    margin-left: 6px;
  }

  .buttons {
    text-align: left;
  }

  .buttons button {
    padding: 6px 14px;
    margin-right: 8px;
    font-size: 13px;
    cursor: pointer;
  }
</style>
</head>
<body>

<div class="card">
  <h1>👤 회원가입</h1>
  <p class="subtitle">SKALA-FRONT 회원가입을 환영합니다.</p>

  <form action="signUpResult.html" method="get">

    <fieldset>
      <legend>계정 정보</legend>

      <div class="row">
        <label for="userId">아이디:</label>
        <input type="text" id="userId" name="userId" placeholder="4~15자 영문/숫자" required>
        <span class="hint">(필수)</span>
      </div>

      <div class="row">
        <label for="userPw">비밀번호:</label>
        <input type="password" id="userPw" name="userPw" placeholder="8자 이상 입력" required>
        <span class="hint">(필수)</span>
      </div>

      <div class="row">
        <label for="emailId">이메일:</label>
        <input type="text" id="emailId" name="emailId" placeholder="example">
        @
        <select name="emailDomain">
          <option value="direct">직접 입력</option>
          <option value="naver.com">naver.com</option>
          <option value="gmail.com">gmail.com</option>
          <option value="daum.net">daum.net</option>
        </select>
      </div>
    </fieldset>

    <fieldset>
      <legend>개인 프로필 정보</legend>

      <div class="row">
        <label for="name">이름:</label>
        <input type="text" id="name" name="name">
      </div>

      <div class="row">
        <label for="birth">생년월일:</label>
        <input type="date" id="birth" name="birth">
      </div>

      <div class="row radio-group">
        <label>성별:</label>
        <label><input type="radio" name="gender" value="male" checked> 남성</label>
        <label><input type="radio" name="gender" value="female"> 여성</label>
        <label><input type="radio" name="gender" value="none"> 선택안함</label>
      </div>

      <div class="row">
        <label>관심 분야 (중복 선택 가능):</label>
        <div class="checkbox-group">
          <div><label><input type="checkbox" name="interest" value="frontend"> 웹 프론트엔드 (Vue.js/HTML)</label></div>
          <div><label><input type="checkbox" name="interest" value="uiux"> UI/UX 디자인 표준</label></div>
          <div><label><input type="checkbox" name="interest" value="backend"> 백엔드 &amp; 데이터베이스</label></div>
          <div><label><input type="checkbox" name="interest" value="cloud"> 클라우드 &amp; 인프라</label></div>
        </div>
      </div>

      <div class="row">
        <label for="route">가입 경로:</label>
        <select id="route" name="route">
          <option value="">-- 선택해 주세요 --</option>
          <option value="search">검색 엔진</option>
          <option value="sns">SNS</option>
          <option value="friend">지인 추천</option>
          <option value="etc">기타</option>
        </select>
      </div>
    </fieldset>

    <fieldset>
      <legend>자기소개</legend>
      <label for="intro">나를 표현하는 한 줄 소개 또는 가입 인사:</label><br><br>
      <textarea id="intro" name="intro" rows="4" maxlength="200" placeholder="여기에 내용을 입력하세요 (최대 200자)"></textarea>
    </fieldset>

    <div class="buttons">
      <button type="submit">동의하고 회원가입</button>
      <button type="reset">다시 작성</button>
    </div>

  </form>
</div>

</body>
</html>
