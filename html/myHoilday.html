<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>나의 휴일 일과</title>
<style>
  body {
    margin: 0;
    padding: 40px 20px;
    background: #dde6f0;
    font-family: "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
    display: flex;
    justify-content: center;
  }

  .card {
    background: #ffffff;
    width: 420px;
    border-radius: 18px;
    padding: 32px 36px 40px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.08);
  }

  h1 {
    font-size: 26px;
    margin: 0 0 26px;
    color: #222;
  }

  h2 {
    font-size: 16px;
    margin: 0 0 14px;
    padding-bottom: 6px;
    border-bottom: 2px solid #333;
    display: inline-block;
  }

  .section {
    margin-bottom: 30px;
  }

  p {
    margin: 6px 0;
    font-size: 14.5px;
    color: #333;
  }

  .time {
    display: inline-block;
    width: 52px;
    font-weight: bold;
    color: #555;
  }

  mark {
    background: #ffe94d;
    padding: 1px 4px;
    border-radius: 3px;
  }

  .footer {
    margin-top: 34px;
    font-size: 13px;
    color: #888;
  }
</style>
</head>
<body>

  <div class="card">
    <h1>🌺 나의 휴일 일과</h1>

    <div class="section">
      <h2>🍏 아침</h2>
      <p><span class="time">10:00 -</span> ⏰ <mark>알람 없이</mark> 일어나기</p>
      <p><span class="time">10:30 -</span> 🍳 아침 먹기</p>
      <p><span class="time">08:50 -</span> ☕ 커피 마시기</p>
    </div>

    <br>

    <div class="section">
      <h2>☀️ 오후 활동</h2>
      <p><span class="time">13:00 -</span> 💤 집에서 쉬기</p>
      <p><span class="time">14:30 -</span> 📷 가족들과 시간 보내기</p>
      <p><span class="time">16:00 -</span> 📱 유튜브 보거나 인스타 하기
    </div>

    <br>

    <div class="section">
      <h2>🌃 저녁</h2>
      <p><span class="time">18:00 -</span> 🍕 친구들과 저녁 먹기</p>
      <p><span class="time">20:00 -</span> 🎬 드라마 또는 <mark>넷플릭스</mark> 감상</p>
      <p><span class="time">23:00 -</span> 🛁 힐링 타임</p>
    </div>

    <p class="footer">🗓️ 휴일 버전 작성일: 2026년 7월</p>
  </div>

</body>
</html>
